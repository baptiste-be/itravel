<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iTravel Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin:0; overflow:hidden;}
#map { height:100vh; width:100vw;}

.apple-blur {
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(20px);
}

button { transition:0.15s; }
button:active { transform:scale(0.92); }

.chip {
    background:#f2f2f7;
    padding:6px 12px;
    border-radius:999px;
    font-size:13px;
    white-space:nowrap;
}
</style>
</head>

<body x-data="app()" x-init="init()">

<div id="map"></div>

<!-- SEARCH -->
<div class="absolute top-6 left-0 right-0 px-4 z-50">
<div class="max-w-md mx-auto apple-blur rounded-2xl p-3 shadow">

<input x-model="search" @input.debounce.300ms="searchPlaces()"
placeholder="Rechercher un lieu..."
class="w-full bg-transparent outline-none text-lg"/>

<div class="flex gap-2 mt-3 overflow-x-auto">
<button class="chip" @click="quickSearch('restaurant')">🍔</button>
<button class="chip" @click="quickSearch('hotel')">🏨</button>
<button class="chip" @click="quickSearch('museum')">🏛️</button>
<button class="chip" @click="quickSearch('park')">🌳</button>
</div>

<div x-show="results.length" class="mt-3">
<template x-for="r in results">
<div @click="selectPlace(r)" class="p-2 hover:bg-gray-100 rounded cursor-pointer">
<span x-text="r.properties.name"></span>
</div>
</template>
</div>

</div>
</div>

<!-- PANEL -->
<div class="absolute bottom-0 left-0 right-0 apple-blur rounded-t-3xl p-5 max-h-[70vh] overflow-auto">

<h2 class="text-xl font-bold">Carnet</h2>

<p class="text-sm text-gray-500">
<span x-text="stops.length"></span> lieux
</p>

<!-- LIST -->
<template x-for="(s,i) in stops">
<div class="flex justify-between items-center mt-3 bg-white p-3 rounded-xl shadow">

<div>
<p class="font-semibold" x-text="s.name"></p>
<p class="text-xs text-gray-500" x-text="s.weather"></p>
</div>

<button @click="remove(i)">❌</button>

</div>
</template>

<!-- ROUTE -->
<button x-show="stops.length>1"
@click="route()"
class="w-full mt-4 bg-blue-600 text-white p-3 rounded-xl">
Tracer itinéraire
</button>

<!-- NOTES -->
<textarea x-model="notes"
placeholder="Notes de voyage..."
class="w-full mt-4 p-3 bg-gray-100 rounded-xl"></textarea>

<!-- INSIGHT -->
<p class="text-xs text-gray-500 mt-3" x-text="insight()"></p>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
function app(){
return {

map:null,
search:'',
results:[],
stops:[],
notes:'',
poly:null,

init(){

this.map = L.map('map',{zoomControl:false})
.setView([50.85,4.35],6);

L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth/{z}/{x}/{y}{r}.png')
.addTo(this.map);

// load saved
this.stops = JSON.parse(localStorage.getItem('stops')||'[]');
this.notes = localStorage.getItem('notes')||'';

this.stops.forEach(s=>{
L.marker([s.lat,s.lng]).addTo(this.map);
});

},

async searchPlaces(){
if(this.search.length<3){this.results=[];return;}

let r = await fetch(`https://photon.komoot.io/api/?q=${this.search}`);
let data = await r.json();

this.results = data.features.slice(0,5);
},

quickSearch(type){
this.search = type;
this.searchPlaces();
},

async selectPlace(p){

let [lng,lat]=p.geometry.coordinates;

let weather = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`);
let w = await weather.json();

let stop = {
name:p.properties.name,
lat,
lng,
weather: Math.round(w.current_weather.temperature)+"°C"
};

this.stops.push(stop);

localStorage.setItem('stops',JSON.stringify(this.stops));

L.marker([lat,lng]).addTo(this.map);

this.map.flyTo([lat,lng],12);

this.results=[];
this.search='';

},

remove(i){
this.stops.splice(i,1);
localStorage.setItem('stops',JSON.stringify(this.stops));
},

async route(){

if(this.poly) this.map.removeLayer(this.poly);

let coords = this.stops.map(s=>`${s.lng},${s.lat}`).join(';');

let r = await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=full&geometries=geojson`);
let data = await r.json();

let latlngs = data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);

this.poly = L.polyline(latlngs,{weight:5}).addTo(this.map);

this.map.fitBounds(this.poly.getBounds());

},

insight(){
if(this.stops.length<2) return "";
return "Astuce : regroupe les lieux proches pour gagner du temps.";
}

}
}
</script>

</body>
</html>
