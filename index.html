<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iTravel · Mes voyages</title>
  <link rel="icon" type="image/png" href="favicon.svg" />
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="apple-bar">
    <div class="apple-bar-inner">
      <div class="brand"><span class="brand-dot"></span><span>iTravel</span></div>
      <nav class="nav-links">
        <a href="index.html">Mes voyages</a>
        <a href="trip.html">Planificateur</a>
      </nav>
    </div>
  </header>

  <main class="app-shell">
    <section class="card" style="padding:22px;">
      <h1 class="section-title">Organise tes voyages</h1>
      <p class="subtitle">Crée un voyage, ouvre une page dédiée, puis configure ton trajet réel.</p>

      <div class="grid" style="grid-template-columns:2fr 1fr; margin-top:16px; gap:12px;">
        <input id="trip-name" class="input" placeholder="Ex: Week-end à Lyon" />
        <button id="trip-create" class="btn btn-primary">Créer le voyage</button>
      </div>
    </section>

    <section class="card" style="padding:22px; margin-top:16px;">
      <h2 style="margin:0; font-size:22px;">Mes voyages sauvegardés</h2>
      <p class="subtitle">Chaque voyage ouvre une page séparée avec son planning et sa carte.</p>
      <div id="trip-list" class="grid grid-3" style="margin-top:12px;"></div>
      <p id="trip-empty" class="muted" style="margin-top:12px;">Aucun voyage pour l’instant.</p>
    </section>
  </main>

  <script src="assets/app-index.js"></script>
</body>
</html>
